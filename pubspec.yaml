name: iron_log
description: "A new Flutter fitness application focused on declarative local persistence."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.8.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # State Management
  flutter_riverpod: ^3.3.1
  riverpod_annotation: ^4.0.2

  # Routing
  go_router: ^17.3.0

  # Local DB
  sqflite: ^2.3.0
  path_provider: ^2.1.2
  path: ^1.9.0

  # Immutable Classes
  freezed_annotation: ^3.1.0
  json_annotation: any
  google_fonts: ^8.0.2
  shared_preferences: ^2.5.5
  intl: ^0.20.2
  share_plus: ^13.2.0
  pdf: ^3.12.0


dev_dependencies:
  flutter_test:
    sdk: flutter

  build_runner: ^2.4.8 # For codegen
  riverpod_generator: ^4.0.3
  freezed: ^3.2.5
  json_serializable: any

  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.3

flutter:
  uses-material-design: true
  assets:
    - assets/icons/
